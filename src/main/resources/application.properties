# Application Name
spring.application.name=stone-inscription


# Server port
server.port=8080

# MongoDB connection
spring.data.mongodb.uri=${MONGO_URI}
# spring.data.mongodb.uri= mongodb://localhost:27017/StoneInscription
# mongodb://inscriptions.cdacb.in:27017/StoneInscription
# mongodb://root:password123@mongodb-primary:27017,mongodb-secondary:27017/StoneInscription?replicaSet=replicaset&authSource=admin

# CORS configuration
app.cors.url=https://inscriptions.cdacb.in

app.backend.url= https://inscriptions.cdacb.in/api
app.frontend.oauth.callback-url=https://inscriptions.cdacb.in/oauth/callback
app.frontend.admin.approval-result-url=https://inscriptions.cdacb.in/admin/approval-result
admin.approval.token-validity-ms=${ADMIN_APPROVAL_TOKEN_VALIDITY_MS:86400000}

geolocation.api.url=https://nominatim.openstreetmap.org/reverse


# JWT configuration

file.extn = .png, .jpeg, .jpg , .webm, .webp

# Basic Spring Security and OAuth2 logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.org.springframework.security.web=DEBUG

# Web request logging to see all incoming requests
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG

# Your application package logging (replace with your actual package)
logging.level.com.cdac.stoneinscription=DEBUG

# HTTP client logging (for OAuth2 token exchanges)
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.apache.http=DEBUG

# Session management logging
logging.level.org.springframework.session=DEBUG

# Filter chain logging to see exact filter execution order
logging.level.org.springframework.security.web.FilterChainProxy=TRACE

# OAuth2 specific components
logging.level.org.springframework.security.oauth2.client=DEBUG
logging.level.org.springframework.security.oauth2.core=DEBUG

# Include stack traces and method names in logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}:%line] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}:%line] - %msg%n

# Enable request/response logging
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# If you want to see method entry/exit (very verbose)
# logging.level.org.springframework.aop=TRACE
spring.servlet.multipart.max-file-size=75MB
spring.servlet.multipart.max-request-size=1200MB

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

