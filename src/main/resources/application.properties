content.moderation.webhook-url=${CONTENT_MODERATION_WEBHOOK_URL}
content.moderation.safe-threshold=${CONTENT_MODERATION_SAFE_THRESHOLD}
content.moderation.connect-timeout-ms=${CONTENT_MODERATION_CONNECT_TIMEOUT_MS}
content.moderation.read-timeout-ms=${CONTENT_MODERATION_READ_TIMEOUT_MS}
content.moderation.insecure-ssl=${CONTENT_MODERATION_INSECURE_SSL}
ai.moderation.webhook-url=${AI_MODERATION_WEBHOOK_URL:https://inscriptions.cdacb.in/n8n/webhook/content-moderation}
