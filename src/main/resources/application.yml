spring:
  datasource:
    hikari:
      pool-name: HikariPool-Main        # gives a readable name in Grafana
      register-mbeans: true             # enables JMX + metric binding
  config:
    import: "optional:file:.env[.properties]"
  management:
    endpoints:
      web:
        exposure:
          include: health, info, metrics, prometheus

    endpoint:
      prometheus:
        enabled: true

    metrics:
      export:
        prometheus:
          enabled: true

      distribution:
        percentiles-histogram:
          http.server.requests: true
  # management:
  #   endpoints:
  #     web:
  #       exposure:
  #         include: health, info, metrics, prometheus
  #   endpoint:
  #     prometheus:
  #       enabled: true
  #   metrics:
  #     export:
  #       prometheus:
  #         enabled: true
  #     distribution:
  #       percentiles-histogram:
  #         http.server.requests: true
  security:
    oauth2:
      client:
        registration:
          # Google OAuth2 Configuration
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "https://inscriptions.cdacb.in/api/login/oauth2/code/{registrationId}"
            # redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          # Facebook OAuth2 Configuration
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID}
            client-secret: ${FACEBOOK_CLIENT_SECRET}
            scope:
              - email
              - public_profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            
          # Apple OAuth2 Configuration
          apple:
            client-id: ${APPLE_CLIENT_ID}
            client-secret: ${APPLE_CLIENT_SECRET}
            scope:
              - name
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Apple
            
        provider:
          # Google OAuth2 Provider (Modified)
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth?prompt=select_account&access_type=offline
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
            
          # Facebook OAuth2 Provider
          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
            token-uri: https://graph.facebook.com/v18.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/v18.0/me?fields=id,name,email,picture
            user-name-attribute: id
            
          # Apple OAuth2 Provider
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            user-name-attribute: sub
            jwk-set-uri: https://appleid.apple.com/auth/keys
            # Apple doesn't have a traditional userinfo endpoint

# Application redirect configuration
app:
  oauth2:
    success-url: /api/v1
    failure-url: /api/v1/fail
    login-page: /api/v1/noauth/check
    default-provider: google  # Default OAuth provider when none specified
    
management:
  server:
    port: 8081          # move actuator to separate port
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true